name: PR gate — API + smoke (playwright-typescript)

# Fast cross-repo gate: on every PR, run the CONSUMER's API tests + @smoke E2E
# (jesuslombardo/playwright-typescript) against THIS app's PR version.
# Kept fast on purpose — the FULL cross-browser regression runs nightly in the
# testing repo (.github/workflows/nightly.yml there). See that repo's ADR-007.

on:
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    name: API + smoke
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
      options: --user 1001
    timeout-minutes: 15

    steps:
      - name: Checkout testing framework (playwright-typescript @ main)
        uses: actions/checkout@v6
        with:
          repository: jesuslombardo/playwright-typescript
          path: tests

      - name: Checkout this app (PR version) into the framework's ./app
        uses: actions/checkout@v6
        with:
          path: tests/app

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            tests/package-lock.json
            tests/app/package-lock.json

      - name: Install framework dependencies
        run: npm ci
        working-directory: tests

      - name: Install app dependencies
        run: npm ci
        working-directory: tests/app

      # webServer (in playwright.config.ts) starts `node app/server.js` — this
      # PR's app — then API tests gate the @smoke critical-path E2E.
      - name: API tests (gate), then @smoke E2E — against this PR's app
        run: npm run test:api && npm run test:smoke
        working-directory: tests

      - name: Upload debug bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pr-gate-debug
          path: |
            tests/playwright-report/
            tests/test-results/
          retention-days: 14
