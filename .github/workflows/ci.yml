name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  unit:
    name: Unit tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (pure functions, no I/O)
        run: npm run test:unit

  integration:
    name: Integration tests
    needs: unit
    runs-on: ubuntu-latest
    env:
      # Real secret injected from repo Settings → Secrets. The app reads
      # process.env.JWT_SECRET to sign/verify JWTs; falls back to its built-in
      # default when unset (e.g. locally or on forks), so nothing breaks.
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Confirm the JWT secret is wired (value stays masked)
        run: echo "JWT_SECRET provided -> ${JWT_SECRET:+yes}"

      - name: Run integration tests (boots the app with the injected secret)
        run: npm run test:integration

  # ── Consumer-driven contract verification (Pact) ────────────────────────────
  # auth-service is the PROVIDER. We pull the pact published by the `shop-web`
  # consumer (in the playwright-typescript repo) and verify auth still satisfies
  # it — if the login response drifts (renames `token`, changes a status), this
  # FAILS. The contract is owned by the consumer, so we check that repo out for
  # it. DIDACTIC — intentionally NOT a required check. See ADR-017 (testing repo).
  contract-provider:
    name: Contract (Pact provider verification)
    needs: quality
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout consumer repo for the published pact
        uses: actions/checkout@v6
        with:
          repository: jesuslombardo/playwright-typescript
          path: consumer

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify auth-service against the shop-web contract
        env:
          PACT_DIR: ${{ github.workspace }}/consumer/pacts
        run: npm run test:contract

  publish-image:
    name: Build & publish image (GHCR)
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  # ── Continuous Deployment: promote through environments ─────────────────────
  # On green main: deploy to STAGING → smoke staging → (manual approval gate) →
  # deploy to PRODUCTION → smoke production. The gate is a GitHub Environment
  # protection rule (`environment: production` has a required reviewer), so the
  # production deploy PAUSES until a human approves. A thin smoke against each
  # live URL proves the deploy itself works. See ADR-012 in the testing repo.

  deploy-staging:
    name: Deploy to staging
    needs: [integration, publish-image]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.RENDER_STAGING_URL }}
    steps:
      - name: Trigger Render deploy (staging Deploy Hook)
        env:
          HOOK: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_STAGING_DEPLOY_HOOK_URL secret is not set"
            exit 1
          fi
          curl -fsS -X POST "$HOOK" > /dev/null
          echo "Staging deploy triggered for commit ${GITHUB_SHA}"

  smoke-staging:
    name: Smoke (staging)
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
      options: --user 1001
    steps:
      - name: Wait for staging to be live & stable
        # Readiness must check the routes the smoke actually uses, not just
        # /health: a free-tier instance serves /health before the static UI and
        # API are ready right after a deploy swap. Require the deployed commit AND
        # / AND /api/products to be 200 for 3 consecutive checks before smoking.
        run: |
          url="${{ vars.RENDER_STAGING_URL }}"
          want=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "Waiting for $url to serve $want on /health + / + /api/products ..."
          ok=0
          for i in $(seq 1 60); do
            commit=$(curl -fsS "$url/health" 2>/dev/null | sed -n 's/.*"commit":"\([^"]*\)".*/\1/p' | cut -c1-7)
            root=$(curl -sS -o /dev/null -w '%{http_code}' "$url/" 2>/dev/null || echo 000)
            prods=$(curl -sS -o /dev/null -w '%{http_code}' "$url/api/products" 2>/dev/null || echo 000)
            echo "  attempt $i: commit=${commit:-<down>}/$want root=$root products=$prods (streak=$ok)"
            if [ "$commit" = "$want" ] && [ "$root" = "200" ] && [ "$prods" = "200" ]; then
              ok=$((ok + 1))
              if [ "$ok" -ge 3 ]; then echo "Live & stable on $want"; exit 0; fi
            else
              ok=0
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for staging to be live & stable"; exit 1

      - name: Checkout testing repository
        uses: actions/checkout@v6
        with:
          repository: jesuslombardo/playwright-typescript
          path: tests

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install testing dependencies
        run: npm ci
        working-directory: tests

      - name: Smoke against staging (chromium only)
        run: npm run test:smoke -- --project=chromium
        working-directory: tests
        env:
          BASE_URL: ${{ vars.RENDER_STAGING_URL }}

  deploy-production:
    name: Deploy to production
    needs: smoke-staging # only promote a build that passed staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: # ← required reviewer here = the manual approval GATE
      name: production
      url: ${{ vars.RENDER_APP_URL }}
    steps:
      - name: Trigger Render deploy (production Deploy Hook)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set"
            exit 1
          fi
          curl -fsS -X POST "$HOOK" > /dev/null
          echo "Production deploy triggered for commit ${GITHUB_SHA}"

  smoke-production:
    name: Smoke (production)
    needs: deploy-production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
      options: --user 1001
    steps:
      - name: Wait for production to be live & stable
        # Same robust readiness as staging: deployed commit AND / AND
        # /api/products must be 200 for 3 consecutive checks before smoking.
        run: |
          url="${{ vars.RENDER_APP_URL }}"
          want=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "Waiting for $url to serve $want on /health + / + /api/products ..."
          ok=0
          for i in $(seq 1 60); do
            commit=$(curl -fsS "$url/health" 2>/dev/null | sed -n 's/.*"commit":"\([^"]*\)".*/\1/p' | cut -c1-7)
            root=$(curl -sS -o /dev/null -w '%{http_code}' "$url/" 2>/dev/null || echo 000)
            prods=$(curl -sS -o /dev/null -w '%{http_code}' "$url/api/products" 2>/dev/null || echo 000)
            echo "  attempt $i: commit=${commit:-<down>}/$want root=$root products=$prods (streak=$ok)"
            if [ "$commit" = "$want" ] && [ "$root" = "200" ] && [ "$prods" = "200" ]; then
              ok=$((ok + 1))
              if [ "$ok" -ge 3 ]; then echo "Live & stable on $want"; exit 0; fi
            else
              ok=0
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for production to be live & stable"; exit 1

      - name: Checkout testing repository
        uses: actions/checkout@v6
        with:
          repository: jesuslombardo/playwright-typescript
          path: tests

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install testing dependencies
        run: npm ci
        working-directory: tests

      - name: Smoke against production (chromium only)
        run: npm run test:smoke -- --project=chromium
        working-directory: tests
        env:
          BASE_URL: ${{ vars.RENDER_APP_URL }}
