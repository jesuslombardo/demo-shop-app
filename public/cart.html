<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo Shop — Cart</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="topbar">
      <h1 data-test="title" id="title">Your cart</h1>
      <button
        data-test="menu-toggle"
        id="menu-toggle"
        class="menu-toggle ghost"
        type="button"
        aria-label="Menu"
        aria-controls="topbar-nav"
        aria-expanded="false"
      >
        ☰
      </button>
      <nav data-test="topbar-nav" id="topbar-nav" class="topbar-nav">
        <a data-test="catalog-link" href="/products.html" class="navlink">← Catalogue</a>
        <a data-test="cart-link" href="/cart.html" class="navlink">🛒 Cart (<span id="cart-count">0</span>)</a>
        <a data-test="orders-link" href="/orders.html" class="navlink">📦 My orders</a>
        <button data-test="logout" id="logout" class="ghost">Logout</button>
      </nav>
    </header>

    <main>
      <p data-test="cart-empty" id="cart-empty" class="empty" hidden>
        Your cart is empty. <a href="/products.html">Browse the catalogue →</a>
      </p>

      <section data-test="cart-items" id="cart-items" class="cart-items"></section>

      <section data-test="cart-summary" id="cart-summary" class="card cart-summary" hidden>
        <div class="summary-row total">
          <span>Subtotal</span>
          <span data-test="cart-subtotal" id="cart-subtotal">$0.00</span>
        </div>
        <button data-test="checkout-button" id="checkout-button">Proceed to checkout</button>
      </section>
    </main>

    <script src="/js/cart.js"></script>
    <script src="/js/session.js"></script>
    <script src="/js/cart-page.js"></script>
  </body>
</html>
