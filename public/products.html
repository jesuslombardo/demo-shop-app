<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo Shop — Products</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="topbar">
      <h1 data-test="title" id="title">Products</h1>
      <button
        data-test="menu-toggle"
        id="menu-toggle"
        class="menu-toggle ghost"
        type="button"
        aria-label="Menu"
        aria-controls="topbar-nav"
        aria-expanded="false"
      >
        ☰
      </button>
      <nav data-test="topbar-nav" id="topbar-nav" class="topbar-nav">
        <span data-test="role-badge" id="role-badge" class="badge" hidden></span>
        <a data-test="cart-link" href="/cart.html" class="navlink">🛒 Cart (<span id="cart-count">0</span>)</a>
        <a data-test="orders-link" href="/orders.html" class="navlink">📦 My orders</a>
        <button data-test="logout" id="logout" class="ghost">Logout</button>
      </nav>
    </header>

    <main>
      <!-- Admin only: catalogue management. Revealed by products.js for admins. -->
      <section class="card add-form" data-test="admin-tools" id="admin-tools" hidden>
        <h2>Add product</h2>
        <form id="add-form" novalidate>
          <input data-test="new-product-name" id="new-product-name" placeholder="Name" />
          <input data-test="new-product-price" id="new-product-price" type="number" step="0.01" placeholder="Price" />
          <input data-test="new-product-description" id="new-product-description" placeholder="Description (optional)" />
          <button data-test="add-product-button" id="add-product-button" type="submit">Add</button>
        </form>
        <p data-test="add-error" id="add-error" class="error" hidden></p>
      </section>

      <!-- Customer only: a hint that this is the storefront. Revealed for customers. -->
      <p data-test="shop-hint" id="shop-hint" class="shop-hint" hidden>
        Browse the catalogue and add items to your cart, then head to checkout.
      </p>

      <section id="product-list" data-test="product-list" class="grid"></section>
    </main>

    <script src="/js/cart.js"></script>
    <script src="/js/session.js"></script>
    <script src="/js/products.js"></script>
  </body>
</html>
