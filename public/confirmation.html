<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo Shop — Order confirmed</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="topbar">
      <h1 data-test="title" id="title">Order confirmed</h1>
      <button
        data-test="menu-toggle"
        id="menu-toggle"
        class="menu-toggle ghost"
        type="button"
        aria-label="Menu"
        aria-controls="topbar-nav"
        aria-expanded="false"
      >
        ☰
      </button>
      <nav data-test="topbar-nav" id="topbar-nav" class="topbar-nav">
        <a data-test="catalog-link" href="/products.html" class="navlink">🛍️ Continue shopping</a>
        <a data-test="cart-link" href="/cart.html" class="navlink">🛒 Cart (<span id="cart-count">0</span>)</a>
        <a data-test="orders-link" href="/orders.html" class="navlink">📦 My orders</a>
        <button data-test="logout" id="logout" class="ghost">Logout</button>
      </nav>
    </header>

    <main>
      <section class="card order-confirmation" data-test="order-confirmation" id="order-confirmation"></section>
    </main>

    <script src="/js/cart.js"></script>
    <script src="/js/session.js"></script>
    <script src="/js/confirmation.js"></script>
  </body>
</html>
